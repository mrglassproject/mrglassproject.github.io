name               = "glassproject-voucher-worker"
main               = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
SITE_URL = "https://mrglassproject.com"

[assets]
directory = "./assets"

[[rules]]
type        = "CompiledWasm"
globs       = ["**/*.wasm"]
fallthrough = true

[[rules]]
type        = "Data"
globs       = ["**/*.ttf"]
fallthrough = true